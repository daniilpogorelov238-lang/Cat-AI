<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деловой Кот</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(145deg,#0b1a2e,#1b2f44);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
        .card{max-width:700px;width:100%;background:rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:40px;padding:22px 24px 28px;box-shadow:0 20px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(255,215,150,0.15);border:1px solid rgba(255,215,150,0.2)}
        .header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
        .avatar{width:64px;height:64px;background:#f7d9aa;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;color:#1b2f44;box-shadow:0 6px 12px rgba(0,0,0,0.4),0 0 0 2px #f7d9aa}
        .title-group h1{color:#f7e9d7;font-weight:600;font-size:1.8rem;display:flex;align-items:center;gap:8px}
        .title-group h1 i{color:#f7d9aa;font-size:1.4rem}
        .sub{color:#b6cdd9;font-size:.85rem;display:flex;align-items:center;gap:8px;margin-top:2px}
        .api-section{background:rgba(0,0,0,0.3);border-radius:40px;padding:12px 18px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;border:1px solid #3b5a70}
        .api-section label{color:#c4d9e6;font-weight:500;display:flex;align-items:center;gap:6px;font-size:.9rem}
        .api-section label i{color:#f7d9aa}
        .api-input{flex:2;min-width:150px;background:#102433;border:1px solid #2f5068;border-radius:60px;padding:8px 16px;color:#f0f6fa;font-size:.9rem;outline:0;transition:.2s}
        .api-input:focus{border-color:#f7d9aa;box-shadow:0 0 0 3px rgba(247,217,170,0.2)}
        .api-input::placeholder{color:#6e8fa3}
        .status-badge{background:#1f4057;padding:4px 14px;border-radius:40px;font-size:.75rem;color:#b6d9e8;display:flex;align-items:center;gap:6px;border:1px solid #2e5a74;white-space:nowrap}
        .status-badge .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6c8f9f}
        .status-badge .dot.active{background:#7ddfb0;box-shadow:0 0 8px #7ddfb0}
        .chat-box{background:rgba(8,22,36,0.6);border-radius:28px;padding:14px 14px 8px;height:320px;display:flex;flex-direction:column;border:1px solid #2e4d61;margin-bottom:14px}
        .messages{flex:1;overflow-y:auto;padding-right:6px;display:flex;flex-direction:column;gap:10px}
        .messages::-webkit-scrollbar{width:4px}
        .messages::-webkit-scrollbar-track{background:#1a3345;border-radius:12px}
        .messages::-webkit-scrollbar-thumb{background:#f7d9aa;border-radius:12px}
        .msg{max-width:85%;padding:10px 16px;border-radius:20px;font-size:.9rem;line-height:1.4;word-break:break-word;background:#173247;color:#e3edf2;align-self:flex-start;border-bottom-left-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
        .msg.user{align-self:flex-end;background:#f7d9aa;color:#102433;border-bottom-right-radius:6px;border-bottom-left-radius:20px}
        .msg.assistant{background:#1b3a4e;border-left:4px solid #f7d9aa}
        .msg .sender{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#92b9ce;margin-bottom:3px}
        .msg.user .sender{color:#4d3a22}
        .msg.assistant .sender{color:#f7d9aa}
        .typing-indicator{display:flex;align-items:center;gap:6px;padding:6px 14px;color:#b0cedb;font-style:italic;font-size:.85rem}
        .typing-indicator .fa-ellipsis-h{animation:pulse 1.2s infinite}
        @keyframes pulse{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
        .input-area{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
        .input-area textarea{flex:2;min-width:150px;background:#0b1f30;border:1px solid #2b4d63;border-radius:40px;padding:10px 18px;color:#f0f6fa;font-size:.9rem;resize:none;outline:0;transition:.15s;height:46px;line-height:1.3;font-family:inherit}
        .input-area textarea:focus{border-color:#f7d9aa;box-shadow:0 0 0 3px rgba(247,217,170,0.15)}
        .input-area textarea::placeholder{color:#5e829a}
        .btn{background:#f7d9aa;border:0;border-radius:60px;padding:0 24px;height:46px;font-weight:600;font-size:.95rem;color:#102433;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;box-shadow:0 6px 14px rgba(0,0,0,0.3);white-space:nowrap}
        .btn:hover{background:#fae2b9;transform:scale(.97)}
        .btn:active{transform:scale(.94)}
        .btn:disabled{opacity:.5;pointer-events:none;filter:grayscale(.6)}
        .footer-actions{display:flex;justify-content:flex-end;margin-top:8px;gap:10px}
        .clear-btn{background:0;border:1px solid #3b5a70;color:#b6cdd9;padding:6px 16px;border-radius:40px;font-size:.75rem;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
        .clear-btn:hover{background:#1d3f52;border-color:#f7d9aa;color:#f7e9d7}
        .footer{margin-top:18px;text-align:center;font-size:.65rem;color:#4d7288}
        .footer i{color:#f7d9aa}
        @media(max-width:550px){.card{padding:16px}.title-group h1{font-size:1.4rem}.avatar{width:52px;height:52px;font-size:28px}.api-section{flex-direction:column;align-items:stretch}.status-badge{align-self:flex-start}.input-area{flex-direction:column}.btn{justify-content:center}}
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="avatar"><i class="fas fa-cat"></i></div>
        <div class="title-group"><h1>Деловой Кот <i class="fas fa-tie" style="font-size:1rem"></i></h1><div class="sub"><i class="fas fa-brain"></i> Groq AI <span style="opacity:.4;margin:0 4px">|</span> <i class="fas fa-comment-dots"></i> синхронизация</div></div>
    </div>
    <div class="api-section">
        <label for="apiKeyInput"><i class="fas fa-key"></i> API Key</label>
        <input type="password" id="apiKeyInput" class="api-input" placeholder="Введите Groq API ключ" value="">
        <div class="status-badge" id="apiStatus"><span class="dot" id="statusDot"></span><span id="statusText">не задан</span></div>
    </div>
    <div class="chat-box">
        <div class="messages" id="messageContainer"><div class="msg assistant"><div class="sender"><i class="fas fa-cat"></i> Деловой Кот</div>Мур-р-р! Я Деловой Кот. Введите API-ключ и задайте вопрос. 🐾</div></div>
        <div id="typingIndicator" class="typing-indicator" style="display:none"><i class="fas fa-ellipsis-h"></i> Кот размышляет...</div>
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="Спросите Делового Кота..."></textarea>
            <button class="btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Спросить</button>
        </div>
    </div>
    <div class="footer-actions"><button class="clear-btn" id="clearChatBtn"><i class="fas fa-eraser"></i> Очистить</button></div>
    <div class="footer"><i class="fas fa-shield-alt"></i> Ключ локально · Groq API</div>
</div>
<script>
    (function(){
        const apiInput=document.getElementById('apiKeyInput'), statusDot=document.getElementById('statusDot'), statusText=document.getElementById('statusText');
        const msgBox=document.getElementById('messageContainer'), userInput=document.getElementById('userInput'), sendBtn=document.getElementById('sendBtn');
        const clearBtn=document.getElementById('clearChatBtn'), typing=document.getElementById('typingIndicator');
        let currentKey=localStorage.getItem('groq_api_key')||'', history=[];
        if(currentKey){apiInput.value=currentKey;updateStatus(true)}else updateStatus(false);
        function updateStatus(ok){statusDot.className='dot'+(ok?' active':'');statusText.textContent=ok?'активен':'не задан';}
        function setKey(k){const t=k.trim();if(t){localStorage.setItem('groq_api_key',t);currentKey=t;updateStatus(true)}else{localStorage.removeItem('groq_api_key');currentKey='';updateStatus(false)}}
        apiInput.addEventListener('change',function(){setKey(this.value)});
        apiInput.addEventListener('blur',function(){setKey(this.value)});
        let timer=null;apiInput.addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(()=>setKey(this.value),500)});
        function addMsg(role,content){const d=document.createElement('div');d.className='msg '+role;const lbl=role==='user'?'Вы':'Деловой Кот',ico=role==='user'?'<i class="fas fa-user"></i>':'<i class="fas fa-cat"></i>';d.innerHTML=`<div class="sender">${ico} ${lbl}</div><div>${content}</div>`;msgBox.appendChild(d);msgBox.scrollTop=msgBox.scrollHeight;}
        function clearChat(){msgBox.innerHTML=`<div class="msg assistant"><div class="sender"><i class="fas fa-cat"></i> Деловой Кот</div>Мур-р-р! Я Деловой Кот. Введите API-ключ и задайте вопрос. 🐾</div>`;history=[];}
        clearBtn.addEventListener('click',clearChat);
        async function sendToGroq(msg){
            const key=currentKey||apiInput.value.trim();
            if(!key){alert('Введите API-ключ Groq');return;}
            if(!currentKey&&key)setKey(key);
            addMsg('user',msg);history.push({role:'user',content:msg});
            typing.style.display='flex';sendBtn.disabled=true;userInput.disabled=true;
            try{
                const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
                    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
                    body:JSON.stringify({model:'mixtral-8x7b-32768',messages:[{role:'system',content:'Ты — Деловой Кот. Отвечай кратко, по делу, с лёгким кошачьим шармом. Используй эмодзи 🐾, 📈, 💼, но не злоупотребляй.'},...history],temperature:.7,max_tokens:500})
                });
                const data=await resp.json();
                if(!resp.ok){let e=`Ошибка Groq (${resp.status})`;if(data.error?.message)e+=`: ${data.error.message}`;throw new Error(e);}
                const reply=data.choices?.[0]?.message?.content||'Мур? Не смог ответить.';
                addMsg('assistant',reply);history.push({role:'assistant',content:reply});
            }catch(e){const errMsg=`❌ ${e.message||'Ошибка'}`;addMsg('assistant',errMsg);history.push({role:'assistant',content:errMsg});}
            finally{typing.style.display='none';sendBtn.disabled=false;userInput.disabled=false;userInput.value='';userInput.focus();}
        }
        function handle(){const m=userInput.value.trim();if(!m){alert('Напишите что-нибудь');return;}const key=currentKey||apiInput.value.trim();if(!key){alert('Сначала введите API-ключ');return;}sendToGroq(m);}
        sendBtn.addEventListener('click',handle);
        userInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handle()}});
        if(currentKey)updateStatus(true);
    })();
</script>
</body>
        </html>
